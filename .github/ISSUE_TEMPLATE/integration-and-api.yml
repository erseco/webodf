name: Integration and API fault
description: Report public API, embedding, framework integration, or unsupported-format issues.
title: "[Integration] "
body:
  - type: dropdown
    id: integration-target
    attributes:
      label: Integration target
      options:
        - Plain browser usage
        - Node.js
        - React / SPA framework
        - Mobile / Cordova
        - Other host application
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected library area
      options:
        - public JavaScript API
        - document loading / embedding
        - framework integration
        - file format support
        - Not sure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Include the code snippet, initialization call, and runtime where the fault appears.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior or error
    validations:
      required: true
