name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache build directory
        id: cache-build
        uses: actions/cache@v4
        with:
          path: build
          key: build-v1-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            build-v1-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake default-jdk libqt5webkit5-dev

      - name: Build webodf.js
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          mkdir -p build
          cd build
          cmake ..
          make webodf.js-target

      - name: Prepare deployment
        if: github.event_name == 'push'
        run: |
          mkdir -p deploy/webodf
          cp build/webodf/webodf.js deploy/webodf/
          cp viewer/index.html deploy/

      - name: Deploy to gh-pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy