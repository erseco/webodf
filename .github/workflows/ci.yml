name: CI
on:
  push:
    branches:
      - "**"
      - "!gh-pages"
    tags:
      - 'v*'
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - reopened
      - synchronize
      - closed
permissions:
  contents: write
  pull-requests: write
concurrency:
  # Serialize all runs that can update gh-pages to avoid preview/deploy push races.
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' || github.ref_name == 'main' || startsWith(github.ref_name, 'v')) && 'gh-pages-writers' || github.ref }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: determine_version
        run: |
          if [[ ${GITHUB_REF} == refs/tags/v* ]]; then
            echo "version_arg=" >> $GITHUB_OUTPUT
          else
            commit_hash=$(git rev-parse --short HEAD)
            echo "version_arg=-DOVERRULED_WEBODF_VERSION=0.0.0-build${commit_hash}" >> $GITHUB_OUTPUT
          fi

      - name: Cache build directory
        id: cache-build
        uses: actions/cache@v5
        with:
          path: build
          key: build-v1-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}-${{ steps.determine_version.outputs.version_arg }}
          restore-keys: |
            build-v1-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}-

      - name: Restore APT cache
        uses: actions/cache@v5
        with:
          path: .apt-cache
          key: apt-v1-${{ runner.os }}-${{ hashFiles('ci/apt-packages.txt') }}
          restore-keys: |
            apt-v1-${{ runner.os }}-

      - name: Seed system APT cache
        run: |
          sudo mkdir -p /var/cache/apt/archives /var/lib/apt/lists
          mkdir -p .apt-cache/archives .apt-cache/lists
          sudo cp -ruv .apt-cache/archives/. /var/cache/apt/archives/ || true
          sudo cp -ruv .apt-cache/lists/. /var/lib/apt/lists/ || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(tr '\n' ' ' < ci/apt-packages.txt)

      - name: Persist APT cache
        if: always()
        run: |
          mkdir -p .apt-cache/archives .apt-cache/lists
          sudo cp -ruv /var/cache/apt/archives/. .apt-cache/archives/ || true
          sudo cp -ruv /var/lib/apt/lists/. .apt-cache/lists/ || true

      - name: Build webodf.js
        run: |
          mkdir -p build
          cd build
          rm -f CMakeCache.txt
          cmake .. ${{ steps.determine_version.outputs.version_arg }}
          make webodf.js-target

      - name: Run automated build validation
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cd build
          make webodf.js-tests

      - name: Checkout gh-pages into deploy
        if: |
          (github.event_name == 'push' && (github.ref_name == 'main' || startsWith(github.ref_name, 'v'))) ||
          (github.event_name == 'pull_request' && github.event.action != 'closed')
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: deploy

      - name: Prepare deployment
        if: |
          (github.event_name == 'push' && (github.ref_name == 'main' || startsWith(github.ref_name, 'v'))) ||
          (github.event_name == 'pull_request' && github.event.action != 'closed')
        run: |
          set -euo pipefail
          # Copy artifacts
          mkdir -p deploy/webodf
          cp build/webodf/webodf.js deploy/webodf/
          cp -r webodf/lib deploy/webodf/
          cp -r programs/editor deploy/
          # cp viewer/index.html deploy/index.html
          cp -r viewer/. deploy/
          cp -r examples/. deploy/examples/

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && (github.ref_name == 'main' || startsWith(github.ref_name, 'v'))
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy

      - name: Deploy PR preview
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: ./deploy
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          wait-for-pages-deployment: true

      - name: Remove PR preview
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          wait-for-pages-deployment: true
          action: remove
