<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebODF Branch Builds</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; }
    .branch-list { max-width: 640px; }
  </style>
  <script>
    async function loadBranches() {
      const listEl = document.getElementById('branches');
      const statusEl = document.getElementById('status');
      try {
        const res = await fetch('branches.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('branches.json not found');
        const branches = await res.json();
        if (!Array.isArray(branches) || branches.length === 0) {
          statusEl.textContent = 'No branch builds found yet.';
          return;
        }
        statusEl.textContent = 'Select a branch build:';
        for (const b of branches) {
          const li = document.createElement('li');
          li.className = 'list-group-item d-flex justify-content-between align-items-center';
          const link = document.createElement('a');
          link.href = encodeURI(b) + '/';
          link.textContent = b;
          li.appendChild(link);
          const openBtn = document.createElement('a');
          openBtn.className = 'btn btn-sm btn-primary';
          openBtn.href = encodeURI(b) + '/';
          openBtn.textContent = 'Open';
          li.appendChild(openBtn);
          listEl.appendChild(li);
        }
      } catch (e) {
        statusEl.textContent = 'No branch index available yet.';
      }
    }
    document.addEventListener('DOMContentLoaded', loadBranches);
  </script>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-3">WebODF Branch Builds</h1>
      <p id="status" class="text-muted">Loading branches…</p>
      <ul id="branches" class="list-group branch-list"></ul>
      <hr class="my-4">
      <p class="text-muted">Each item opens the viewer at <code>/{branch}/</code> using that branch's <code>webodf.js</code> and sample files.</p>
    </div>
  </body>
  </html>
