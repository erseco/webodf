<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebODF Viewer Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="/webodf/webodf.js"></script>
  <style>
    body {
      padding-top: 5rem;
    }
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      padding: 1rem;
      background: #f8f9fa;
      border-right: 1px solid #dee2e6;
    }
    #viewer-container {
      margin-left: 250px;
      padding: 1rem;
      background-color: #f0f0f0;
      position: relative;
      min-height: 100vh;
    }
    #loading-indicator {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(240, 240, 240, 0.8);
      z-index: 10;
    }
    #odf-viewer {
      min-height: 60vh;
    }
    #odf-viewer .odf-page {
      background-color: white;
      border: 1px solid #ccc;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin: 1rem auto;
      padding: 2cm; /* A4-like padding */
    }
    #drop-zone {
      border: 2px dashed #ccc;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1rem;
      cursor: pointer;
    }
    #drop-zone:hover, #drop-zone:focus {
      border-color: #0d6efd;
      background-color: #e9ecef;
    }
    #file-input {
      display: none;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h5>Sample ODT Files</h5>
    <ul class="list-group">
      <li class="list-group-item"><a href="#" data-url="examples/sample1.odt">Sample 1</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/sample2.odt">Sample 2</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/sample3.odt">Sample 3</a></li>

      <li class="list-group-item"><a href="#" data-url="examples/OpenDocument-v1.4-part3-schema.odt">OpenDocument v1.4 Part 3 – Schema</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/OpenDocument-v1.2-cd05-part1.odt">OpenDocument v1.2 CD05 – Part 1</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/OpenDocument-v1.4-part1-introduction.odt">OpenDocument v1.4 – Part 1 Introduction</a></li>
    </ul>
    <hr>
    <div id="drop-zone" role="button" tabindex="0">
      <p class="mb-1 fw-semibold">Drag &amp; drop your .odt file here</p>
      <p class="mb-0 text-secondary small">or click to choose a file from your device</p>
      <input type="file" id="file-input" accept=".odt,.fodt,application/vnd.oasis.opendocument.text">
    </div>
  </div>

  <div id="viewer-container">
    <div id="loading-indicator" class="d-none">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 mb-0 text-muted">Loading document...</p>
      </div>
    </div>
    <div id="odf-viewer"></div>
  </div>

  <script>
    const odfViewer = document.getElementById('odf-viewer');
    const odfCanvas = new odf.OdfCanvas(odfViewer);
    const loadingIndicator = document.getElementById('loading-indicator');
    let transientObjectUrl = null;

    function setLoading(isLoading) {
      if (isLoading) {
        loadingIndicator.classList.remove('d-none');
      } else {
        loadingIndicator.classList.add('d-none');
      }
    }

    function loadDocument(url, options = {}) {
      const { isObjectUrl = false } = options;

      if (isObjectUrl) {
        if (transientObjectUrl) {
          URL.revokeObjectURL(transientObjectUrl);
        }
        transientObjectUrl = url;
      } else if (transientObjectUrl) {
        URL.revokeObjectURL(transientObjectUrl);
        transientObjectUrl = null;
      }

      setLoading(true);
      odfCanvas.load(url);
    }

    odfCanvas.addListener('statereadychange', container => {
      if (!container) {
        setLoading(false);
        return;
      }

      const state = container.state;
      if (state === odf.OdfContainer.LOADING) {
        setLoading(true);
      }
      if (state === odf.OdfContainer.DONE || state === odf.OdfContainer.INVALID) {
        setLoading(false);
      }
    });

    document.querySelectorAll('.list-group-item a').forEach(item => {
      item.addEventListener('click', event => {
        event.preventDefault();
        const url = event.target.getAttribute('data-url');
        loadDocument(url);
      });
    });

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const browseKeys = ['Enter', ' ', 'Space', 'Spacebar'];

    dropZone.addEventListener('dragover', event => {
      event.preventDefault();
      dropZone.style.backgroundColor = '#e9ecef';
    });

    dropZone.addEventListener('dragleave', event => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'transparent';
    });

    function handleFile(file) {
      if (!file) {
        setLoading(false);
        return;
      }

      const reader = new FileReader();
      setLoading(true);
      reader.onload = function(e) {
        const arrayBuffer = e.target.result;
        const blob = new Blob([arrayBuffer], { type: 'application/vnd.oasis.opendocument.text' });
        const url = URL.createObjectURL(blob);
        loadDocument(url, { isObjectUrl: true });
      };
      reader.onerror = function() {
        setLoading(false);
        console.error('Failed to read the selected file.', reader.error);
      };
      reader.readAsArrayBuffer(file);
    }

    dropZone.addEventListener('click', () => {
      fileInput.click();
    });

    dropZone.addEventListener('keydown', event => {
      if (browseKeys.includes(event.key)) {
        event.preventDefault();
        fileInput.click();
      }
    });

    dropZone.addEventListener('drop', event => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'transparent';
      const file = event.dataTransfer.files ? event.dataTransfer.files[0] : null;
      handleFile(file);
    });

    fileInput.addEventListener('change', event => {
      const file = event.target.files ? event.target.files[0] : null;
      handleFile(file);
      event.target.value = '';
    });
  </script>
</body>
</html>
