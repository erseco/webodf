<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebODF Viewer Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="webodf/webodf.js"></script>
  <style>
    body {
      padding-top: 5rem;
    }
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      padding: 1rem;
      background: #f8f9fa;
      border-right: 1px solid #dee2e6;
    }
    #viewer-container {
      margin-left: 250px;
      padding: 1rem;
    }
    #drop-zone {
      border: 2px dashed #ccc;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h5>Sample ODT Files</h5>
    <ul class="list-group">
      <li class="list-group-item"><a href="#" data-url="examples/sample1.odt">Sample 1</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/sample2.odt">Sample 2</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/sample3.odt">Sample 3</a></li>

      <li class="list-group-item"><a href="#" data-url="examples/OpenDocument-v1.4-part3-schema.odt">OpenDocument v1.4 Part 3 – Schema</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/OpenDocument-v1.2-cd05-part1.odt">OpenDocument v1.2 CD05 – Part 1</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/OpenDocument-v1.4-part1-introduction.odt">OpenDocument v1.4 – Part 1 Introduction</a></li>
    </ul>
    <hr>
    <div id="drop-zone">
      Drag and drop an ODT file here
    </div>
  </div>

  <div id="viewer-container">
    <div id="odf-viewer"></div>
  </div>

  <script>
    const odfViewer = document.getElementById('odf-viewer');
    const odfCanvas = new odf.OdfCanvas(odfViewer);

    document.querySelectorAll('.list-group-item a').forEach(item => {
      item.addEventListener('click', event => {
        event.preventDefault();
        const url = event.target.getAttribute('data-url');
        odfCanvas.load(url);
      });
    });

    const dropZone = document.getElementById('drop-zone');

    dropZone.addEventListener('dragover', event => {
      event.preventDefault();
      dropZone.style.backgroundColor = '#e9ecef';
    });

    dropZone.addEventListener('dragleave', event => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'transparent';
    });

    dropZone.addEventListener('drop', event => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'transparent';
      const file = event.dataTransfer.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const arrayBuffer = e.target.result;
          const blob = new Blob([arrayBuffer], { type: 'application/vnd.oasis.opendocument.text' });
          const url = URL.createObjectURL(blob);
          odfCanvas.load(url);
        };
        reader.readAsArrayBuffer(file);
      }
    });
  </script>
</body>
</html>
