<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebODF Viewer Demo</title>
  <script src="webodf/webodf.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 1rem;
    }
    #container {
      background: white;
      border: 1px solid #ccc;
      padding: 1rem;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h2>Visualizar archivo ODT con WebODF</h2>
  <input type="file" id="fileInput" accept=".odt">
  <div id="container"></div>

  <script>
    document.getElementById('fileInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (evt) {
        const arrayBuffer = evt.target.result;
        const blob = new Blob([arrayBuffer], { type: 'application/vnd.oasis.opendocument.text' });
        const url = URL.createObjectURL(blob);

        const odfCanvas = new odf.OdfCanvas(document.getElementById('container'));
        odfCanvas.load(url);
      };
      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
