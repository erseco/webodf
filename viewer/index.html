<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebODF Viewer Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-top: 5rem;
    }
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      padding: 1rem;
      background: #f8f9fa;
      border-right: 1px solid #dee2e6;
    }
    #viewer-container {
      margin-left: 250px;
      padding: 1rem;
      height: calc(100vh - 5rem);
    }
    #viewer-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h5>Sample ODT Files</h5>
    <ul class="list-group">
      <li class="list-group-item"><a href="#" data-url="examples/sample1.odt">Sample 1 (100kB)</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/sample2.odt">Sample 2 (500kB)</a></li>
      <li class="list-group-item"><a href="#" data-url="examples/sample3.odt">Sample 3 (1MB)</a></li>
    </ul>
    <hr>
    <p>To view a local file, drag and drop it into the viewer frame on the right.</p>
  </div>

  <div id="viewer-container" id="viewer-container">
    <iframe id="viewer-iframe" src="viewerjs-0.5.8/ViewerJS/#../../examples/sample1.odt"></iframe>
  </div>

  <script>
    document.querySelectorAll('.list-group-item a').forEach(item => {
      item.addEventListener('click', event => {
        event.preventDefault();
        const url = event.target.getAttribute('data-url');
        const viewerContainer = document.getElementById('viewer-container');
        const oldIframe = document.getElementById('viewer-iframe');
        viewerContainer.removeChild(oldIframe);

        const newIframe = document.createElement('iframe');
        newIframe.id = 'viewer-iframe';
        newIframe.src = `viewerjs-0.5.8/ViewerJS/#../../${url}`;
        newIframe.style.width = '100%';
        newIframe.style.height = '100%';
        newIframe.style.border = 'none';
        viewerContainer.appendChild(newIframe);
      });
    });
  </script>
</body>
</html>
